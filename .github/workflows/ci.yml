name: CI

on:
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup environment
        uses: ./.github/actions/setup-env
      - name: Run unit tests
        run: uv run pytest test/unit
      - name: Run integration tests
        run: uv run pytest test/integration
