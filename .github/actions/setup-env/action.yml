name: Setup environment
description: Install just, python, uv, sync venv

runs:
  using: composite
  steps:
    - name: Install python
      uses: actions/setup-python@v5
      with:
        python-version-file: .python-version
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
    - name: Setup venv
      shell: bash
      run: uv sync --locked --dev
